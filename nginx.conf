# Bren'Art Studio — service statique avec URLs propres (SPA pré-rendue)
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Sécurité de base
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Compression
  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json
             image/svg+xml application/xml application/rss+xml font/woff2;

  # robots.txt & sitemap.xml explicites
  location = /robots.txt  { try_files /robots.txt  =404; access_log off; }
  location = /sitemap.xml { try_files /sitemap.xml =404; }

  # Redirections 301 : anciennes URLs des pages légales (noms de fichiers
  # .dc.html avec espaces/accents) -> nouveaux slugs propres.
  location ~* ^/Mentions.*Bren.*\.dc\.html$      { return 301 /mentions-legales; }
  location ~* ^/Confidentialit.*Bren.*\.dc\.html$ { return 301 /confidentialite; }
  location ~* ^/CGV.*Bren.*\.dc\.html$            { return 301 /cgv; }

  # Assets statiques : cache moyen (noms de fichiers non versionnés)
  location ~* \.(?:js|css|woff2?|ttf|otf|png|jpe?g|webp|gif|svg|ico|mp4|webm)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  # Pages : chaque URL propre a son fichier réel (/portfolio -> /portfolio/index.html).
  # Le HTML n'est pas mis en cache agressivement (le contenu peut évoluer).
  location / {
    add_header Cache-Control "no-cache";
    try_files $uri $uri/ =404;
  }

  # Page 404 -> accueil (optionnel : décommenter pour renvoyer l'accueil)
  # error_page 404 /index.html;
}
